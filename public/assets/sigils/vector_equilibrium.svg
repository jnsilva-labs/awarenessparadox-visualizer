<svg xmlns="http://www.w3.org/2000/svg" viewBox="-120 -120 240 240" stroke="#FFFFFF" fill="none" stroke-width="0.5">
  <g opacity="0.8">
    <!-- Vector Equilibrium / Cuboctahedron 2D Projection -->
    
    <!-- Central Hexagon -->
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" />
    
    <!-- Outer Hexagon -->
    <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50" />
    
    <!-- Radial Lines from center -->
    <line x1="0" y1="0" x2="0" y2="-100" />
    <line x1="0" y1="0" x2="86.6" y2="-50" />
    <line x1="0" y1="0" x2="86.6" y2="50" />
    <line x1="0" y1="0" x2="0" y2="100" />
    <line x1="0" y1="0" x2="-86.6" y2="50" />
    <line x1="0" y1="0" x2="-86.6" y2="-50" />
    
    <!-- Inner diagonals -->
    <line x1="-43.3" y1="-25" x2="43.3" y2="25" />
    <line x1="43.3" y1="-25" x2="-43.3" y2="25" />
    
    <!-- Outer diagonals -->
    <line x1="-86.6" y1="-50" x2="86.6" y2="50" />
    <line x1="86.6" y1="-50" x2="-86.6" y2="50" />

    <!-- Connecting inner to outer vertices -->
    <line x1="-43.3" y1="-25" x2="-86.6" y2="50" />
    <line x1="43.3" y1="-25" x2="86.6" y2="50" />
    <line x1="-43.3" y1="25" x2="-86.6" y2="-50" />
    <line x1="43.3" y1="25" x2="86.6" y2="-50" />
    <line x1="0" y1="-50" x2="86.6" y2="50" />
    <line x1="0" y1="-50" x2="-86.6" y2="50" />
    <line x1="0" y1="50" x2="86.6" y2="-50" />
    <line x1="0" y1="50" x2="-86.6" y2="-50" />

    <!-- Core Center Dot -->
    <circle cx="0" cy="0" r="2" fill="#FFFFFF" />
  </g>
</svg>
